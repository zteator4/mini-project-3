<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MLB Live Scoreboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <h1>⚾ MLB Scoreboard</h1>
      <div class="header-controls">
        <span id="today-date"></span>
        <button id="fav-btn">⭐ Set Favorite Team</button>
      </div>
    </div>
  </header>

  <!-- Favorite team modal -->
  <div id="fav-modal" class="modal hidden">
    <div class="modal-content">
      <h2>Choose Your Favorite Team</h2>
      <select id="team-select">
        <option value="">Loading teams...</option>
      </select>
      <div class="modal-actions">
        <button id="save-fav">Save</button>
        <button id="close-modal">Cancel</button>
      </div>
    </div>
  </div>

  <main>
    <!-- Baseball News Feed -->
    <section id="news-section">
      <div class="news-header">
        <h2>⚡ Baseball News</h2>
        <div class="news-source-tabs">
          <button class="news-tab active" data-source="mlb">MLB.com</button>
          <button class="news-tab" data-source="espn">ESPN</button>
        </div>
      </div>
      <div id="news-feed">
        <!-- Injected by JS -->
      </div>
    </section>

    <!-- Stats Leaders -->
    <section id="leaders-section">
      <div class="leaders-header">
        <h2>📊 League Leaders</h2>
        <div class="leaders-tabs">
          <button class="leaders-tab active" data-type="hitting">Hitting</button>
          <button class="leaders-tab" data-type="pitching">Pitching</button>
        </div>
      </div>
      <div id="leaders-grid">
        <!-- Injected by JS -->
      </div>
    </section>

    <!-- Two-column layout: scoreboard + standings -->
    <div class="content-layout">

      <!-- Left: Scoreboard -->
      <div class="scoreboard-col">
        <!-- Search / Filter Controls -->
        <div class="controls">
          <div class="control-group">
            <label for="date-picker">📅 Date</label>
            <div class="date-nav">
              <button id="prev-day" class="nav-arrow" title="Previous day">&#8592;</button>
              <input type="date" id="date-picker" />
              <button id="next-day" class="nav-arrow" title="Next day">&#8594;</button>
              <button id="today-btn" class="hidden">Today</button>
            </div>
          </div>
          <div class="control-group">
            <label for="team-filter">🔍 Filter by Team</label>
            <input type="text" id="team-filter" placeholder="e.g. Red Sox, Yankees..." />
          </div>
          <button id="clear-filter" class="hidden">✕ Clear Filter</button>
        </div>

        <!-- Recent Results -->
        <section id="recent-results">
          <div class="recent-header" id="recent-toggle">
            <h3>🕐 Recent Results</h3>
            <span id="recent-chevron">▼</span>
          </div>
          <div id="recent-body">
            <!-- Injected by JS -->
          </div>
        </section>

        <!-- Loading state -->
        <div id="loading" class="hidden">
          <div class="spinner"></div>
          <p>Loading today's games...</p>
        </div>

        <!-- Error state -->
        <div id="error" class="hidden">
          <p>😔 Couldn't load today's games. Please try again later.</p>
          <button id="retry-btn">Retry</button>
        </div>

        <!-- No games state -->
        <div id="no-games" class="hidden">
          <p>No MLB games scheduled for today. Check back tomorrow!</p>
        </div>

        <!-- Scoreboard -->
        <section id="scoreboard">
          <!-- Game cards injected here by JS -->
        </section>
      </div>

      <!-- Right: Standings Sidebar -->
      <aside id="standings-sidebar">
        <div class="standings-header">
          <h2>🏆 Standings</h2>
          <div class="standings-tabs">
            <button class="standings-tab active" data-league="AL">AL</button>
            <button class="standings-tab" data-league="NL">NL</button>
          </div>
        </div>
        <div id="standings-body">
          <!-- Injected by JS -->
        </div>
      </aside>

    </div><!-- end .content-layout -->
  </main>

  <!-- Game detail modal -->
  <div id="detail-modal" class="modal hidden">
    <div class="modal-content detail-content">
      <button id="close-detail">✕</button>
      <div id="detail-body">
        <!-- Injected by JS -->
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
